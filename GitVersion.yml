mode: ContinuousDelivery
commit-message-incrementing: Enabled
branches:
  main:
    regex: ^main$
    mode: ContinuousDelivery
    label: ''
    is-main-branch: true
  feature:
    regex: ^features?[/-]
    label: alpha
    increment: Minor
  develop:
    regex: ^develop$
    label: beta
    increment: Minor
ignore:
  sha: []
